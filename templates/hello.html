<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Churn Analytics</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            color: #2d3436;
        }

        .hero-section {
            padding: 80px 0 40px;
            text-align: center;
        }

        .hero-section h1 {
            font-weight: 700;
            color: #0d6efd;
            margin-bottom: 1rem;
        }

        .prediction-card {
            background: #ffffff;
            border: none;
            border-radius: 1.5rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            padding: 40px;
            margin-bottom: 50px;
        }

        .form-label {
            font-weight: 600;
            font-size: 0.9rem;
            color: #495057;
            margin-bottom: 8px;
        }

        .form-control, .form-select {
            border-radius: 10px;
            padding: 12px;
            border: 1px solid #dee2e6;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 0 0.25 margin rgba(13, 110, 253, 0.15);
        }

        .btn-predict {
            padding: 14px;
            font-weight: 700;
            border-radius: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.2s ease;
        }

        .btn-predict:hover {
            transform: translateY(-2px);
        }

        .section-divider {
            height: 2px;
            background: #e9ecef;
            margin: 2rem 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <header class="hero-section" data-aos="fade-down" data-aos-duration="1000">
            <h1>Predictive Churn Analysis</h1>
            <p class="text-muted mx-auto" style="max-width: 600px;">
                Enter customer behavioral data below to calculate the probability of churn using our advanced machine learning engine.
            </p>
        </header>

        <div class="row justify-content-center">
            <div class="col-lg-8 col-md-10">
                <div class="prediction-card" data-aos="fade-up" data-aos-delay="200">
                    <form method="post">
                        
                        <h5 class="mb-4 text-primary">1. Customer Demographics</h5>
                        <div class="row g-3">
                            <div class="col-md-6" data-aos="fade-right" data-aos-delay="300">
                                <label for="age" class="form-label">Age</label>
                                <input type="number" class="form-control" id="age" name="age" placeholder="e.g. 35" required>
                            </div>
                            <div class="col-md-6" data-aos="fade-left" data-aos-delay="300">
                                <label for="gender" class="form-label">Gender</label>
                                <select class="form-select" id="gender" name="gender" required>
                                    <option value="" selected disabled>Select Gender</option>
                                    <option value="1">Male</option>
                                    <option value="0">Female</option>
                                </select>
                            </div>
                        </div>

                        <div class="section-divider"></div>

                        <h5 class="mb-4 text-primary">2. Financial & Engagement</h5>
                        <div class="row g-3">
                            <div class="col-md-6" data-aos="zoom-in" data-aos-delay="400">
                                <label for="total_spend" class="form-label">Total Spend ($)</label>
                                <input type="number" class="form-control" id="total_spend" name="Total_Spend" step="0.01" required>
                            </div>
                            <div class="col-md-6" data-aos="zoom-in" data-aos-delay="450">
                                <label for="average_order_value" class="form-label">Avg. Order Value</label>
                                <input type="number" class="form-control" id="average_order_value" name="Average_Order_Value" step="0.01" required>
                            </div>
                            <div class="col-md-6" data-aos="zoom-in" data-aos-delay="500">
                                <label for="purchase_frequency" class="form-label">Purchase Frequency</label>
                                <input type="number" class="form-control" id="purchase_frequency" name="Purchase_Frequency" placeholder="Orders per year" required>
                            </div>
                            <div class="col-md-6" data-aos="zoom-in" data-aos-delay="550">
                                <label for="last_purchase_days" class="form-label">Last Purchase (Days Ago)</label>
                                <input type="number" class="form-control" id="last_purchase_days" name="Last_Purchase_Days" required>
                            </div>
                        </div>

                        <div class="section-divider"></div>

                        <h5 class="mb-4 text-primary">3. Satisfaction Metrics</h5>
                        <div class="row g-3">
                            <div class="col-md-4" data-aos="fade-up" data-aos-delay="600">
                                <label for="customer_rating" class="form-label">Customer Rating (1-5)</label>
                                <input type="number" class="form-control" id="customer_rating" name="Customer_Rating" step="0.1" max="5" required>
                            </div>
                            <div class="col-md-4" data-aos="fade-up" data-aos-delay="650">
                                <label for="complaint_raised" class="form-label">Complaint Raised?</label>
                                <select class="form-select" id="complaint_raised" name="Complaint_Raised" required>
                                    <option value="0">No</option>
                                    <option value="1">Yes</option>
                                </select>
                            </div>
                            <div class="col-md-4" data-aos="fade-up" data-aos-delay="700">
                                <label for="return_count" class="form-label">Return Count</label>
                                <input type="number" class="form-control" id="return_count" name="Return_Count" required>
                            </div>
                        </div>

                        <div class="mt-5">
                            <button type="submit" class="btn btn-primary btn-predict w-100 shadow-sm">
                                Generate Prediction Report
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        // Initialize AOS animations
        AOS.init({
            duration: 800,
            once: true, // Animation happens only once while scrolling down
            easing: 'ease-in-out'
        });
    </script>
</body>
</html>
